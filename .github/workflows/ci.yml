name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint

      - name: Run Tests
        run: npm run test -- --run
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Build Check
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Build Docker Image
        run: docker build -t dws-blog .
